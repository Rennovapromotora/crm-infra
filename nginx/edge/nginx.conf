worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    upstream crm_frontend {
        server web:80;
        keepalive 16;
    }

    upstream crm_api_app {
        server api:80;
        keepalive 16;
    }

    # ── ACME HTTP-01 (Certbot stand-alone ou webroot neste volume) ──
    server {
        listen 80;
        server_name crm.rennovafgts.com.br api.rennovafgts.com.br partner.rennovapromotora.com.br;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Frontend CRM ──
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name crm.rennovafgts.com.br;

        ssl_certificate     /etc/nginx/certs/crm-fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/crm-privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;

        location / {
            proxy_pass http://crm_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }

    # ── Portal do Parceiro ──
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name partner.rennovapromotora.com.br;

        ssl_certificate     /etc/nginx/certs/partner-fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/partner-privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;

        location / {
            proxy_pass http://crm_api_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 120s;
            proxy_set_header Connection "";
        }
    }

    # ── API Laravel (prefixo /api no app) ──
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name api.rennovafgts.com.br;

        ssl_certificate     /etc/nginx/certs/api-fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/api-privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;

        location / {
            proxy_pass http://crm_api_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 120s;
            proxy_set_header Connection "";
        }
    }
}
