# Produção: API e front atrás de Nginx edge com TLS.
# Domínios: https://crm.rennovafgts.com.br  e  https://api.rennovafgts.com.br
#
# 1) cp .env.prod.example .env.prod  e preencha segredos
# 2) Coloque PEMs em ./certs (veja certs/LEIA-ME.txt)
# 3) docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
# 4) Migrações (uma vez):
#      docker compose --env-file .env.prod -f docker-compose.prod.yml exec api php artisan migrate --force
#
# Opcional antes do TLS: gere certificados e copie PEMs para ./certs/.
# Renovacao: repetir cópia/symlinks após renew do Certbot ou montar pasta do host.

name: crm-infra-prod

services:
  mysql:
    image: mysql:8.0
    container_name: crm-infra-prod-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?defina MYSQL_ROOT_PASSWORD em .env.prod}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:?defina MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER:?defina MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?defina MYSQL_PASSWORD}"
    volumes:
      - mysql_prod_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - crm

  redis:
    image: redis:7-alpine
    container_name: crm-infra-prod-redis
    restart: always
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD:?defina REDIS_PASSWORD em .env.prod}"
      - --appendonly
      - "yes"
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - "allkeys-lru"
    volumes:
      - redis_prod_data:/data
    expose:
      - "6379"
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm

  api:
    build:
      context: ${CRM_API_PATH:-../crm-api}
      dockerfile: Dockerfile
      target: production
    image: crm-infra-api:prod
    container_name: crm-infra-prod-api
    restart: always
    expose:
      - "80"
    environment:
      APP_NAME: "${API_APP_NAME:-CRM Rennova API}"
      APP_ENV: production
      APP_KEY: "${APP_KEY:?defina APP_KEY}"
      APP_DEBUG: "false"
      APP_URL: "${API_APP_URL:-https://api.rennovafgts.com.br}"

      APP_TIMEZONE: "${APP_TIMEZONE:-America/Sao_Paulo}"
      APP_LOCALE: "${APP_LOCALE:-pt_BR}"
      APP_FALLBACK_LOCALE: "${APP_FALLBACK_LOCALE:-pt_BR}"

      LOG_CHANNEL: stderr
      LOG_LEVEL: "${API_LOG_LEVEL:-warning}"

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${MYSQL_DATABASE:?}"
      DB_USERNAME: "${MYSQL_USER:?}"
      DB_PASSWORD: "${MYSQL_PASSWORD:?}"

      BROADCAST_CONNECTION: log
      CACHE_STORE: redis
      FILESYSTEM_DISK: public
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      SESSION_LIFETIME: "${SESSION_LIFETIME:-120}"

      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:?}"

      SANCTUM_TOKEN_EXPIRATION: "${SANCTUM_TOKEN_EXPIRATION:-1440}"
      SANCTUM_STATEFUL_DOMAINS: "${SANCTUM_STATEFUL_DOMAINS:-crm.rennovafgts.com.br}"

      FRONTEND_URL: "${FRONTEND_URL:-https://crm.rennovafgts.com.br}"
      TRUST_PROXY: "true"
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-*}"

      MAIL_MAILER: "${MAIL_MAILER:-smtp}"
      MAIL_HOST: "${MAIL_HOST:?}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME:?}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:?}"
      MAIL_ENCRYPTION: "${MAIL_ENCRYPTION:-tls}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-noreply@rennova.com.br}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-CRM Rennova}"

      BANK_CONSULTATION_QUEUE: "${BANK_CONSULTATION_QUEUE:-bank-consultations}"
      BANK_CONSULTATION_TIMEOUT: "${BANK_CONSULTATION_TIMEOUT:-30}"
      BANK_CONSULTATION_ALLOWED_DRIVERS: "${BANK_CONSULTATION_ALLOWED_DRIVERS:-facta}"

      FACTA_ENABLED: "${FACTA_ENABLED:-true}"
      FACTA_API_URL: "${FACTA_API_URL:-https://webservice.facta.com.br}"
      FACTA_API_USERNAME: "${FACTA_API_USERNAME:?}"
      FACTA_API_PASSWORD: "${FACTA_API_PASSWORD:?}"
      FACTA_OFFLINE_URL: "${FACTA_OFFLINE_URL:-https://cltoff.facta.com.br/clt/base-offline}"
      FACTA_TOKEN_RENEWAL_BUFFER_SECONDS: "${FACTA_TOKEN_RENEWAL_BUFFER_SECONDS:-120}"
      FACTA_PRODUTO: "${FACTA_PRODUTO:-D}"
      FACTA_TIPO_OPERACAO: "${FACTA_TIPO_OPERACAO:-13}"
      FACTA_AVERBADOR: "${FACTA_AVERBADOR:-10010}"
      FACTA_CONVENIO: "${FACTA_CONVENIO:-3}"
      FACTA_OPCAO_VALOR: "${FACTA_OPCAO_VALOR:-1}"
      FACTA_TIPO_ENVIO: "${FACTA_TIPO_ENVIO:-WHATSAPP}"
      FACTA_POLICY_PRAZO_DEFAULT: "${FACTA_POLICY_PRAZO_DEFAULT:-180}"
      FACTA_POLICY_VALOR_EMPRESTIMO_DEFAULT: "${FACTA_POLICY_VALOR_EMPRESTIMO_DEFAULT:-18000}"
      FACTA_OPERATIONS_PRAZO_DEFAULT: "${FACTA_OPERATIONS_PRAZO_DEFAULT:-180}"
      FACTA_OPERATIONS_VALOR_DEFAULT: "${FACTA_OPERATIONS_VALOR_DEFAULT:-18000}"

      C6BANK_ENABLED: "${C6BANK_ENABLED:-false}"
      C6BANK_API_URL: "${C6BANK_API_URL:-https://marketplace-proposal-service-api-p.c6bank.info}"
      C6BANK_USERNAME: "${C6BANK_USERNAME:-}"
      C6BANK_PASSWORD: "${C6BANK_PASSWORD:-}"
    volumes:
      - api_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - crm

  web:
    build:
      context: ${CRM_WEB_PATH:-../crm-rennova}
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: "${REACT_APP_API_URL:?defina REACT_APP_API_URL (ex.: https://api.rennovafgts.com.br/api)}"
        REACT_APP_API_KEY: "${REACT_APP_API_KEY:-}"
        REACT_APP_API_KEY_HEADER: "${REACT_APP_API_KEY_HEADER:-X-API-KEY}"
        REACT_APP_ZAPI_INSTANCE_ID: "${REACT_APP_ZAPI_INSTANCE_ID:-}"
        REACT_APP_ZAPI_ACCESS_TOKEN: "${REACT_APP_ZAPI_ACCESS_TOKEN:-}"
        REACT_APP_ZAPI_CLIENT_TOKEN: "${REACT_APP_ZAPI_CLIENT_TOKEN:-}"
    image: crm-infra-web:prod
    container_name: crm-infra-prod-web
    restart: always
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - crm

  edge:
    image: nginx:1.27-alpine
    container_name: crm-infra-prod-edge
    restart: always
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
      - "${EDGE_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/edge/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - crm

volumes:
  mysql_prod_data:
  redis_prod_data:
  api_storage:
  certbot_webroot:

networks:
  crm:
    driver: bridge
